<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>史前記憶石板牆</title>
  <style>
    body { 
      background-color: #1a1a1a; /* 深邃的洞穴背景 */
      color: #e0e0e0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      padding: 20px; 
    }
    h1 { color: #ff9800; text-shadow: 0 0 10px #ff9800; }
    .stone-container { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 20px; 
      margin-top: 40px; 
    }
    .stone {
      background: #333; 
      border-radius: 8px; 
      padding: 25px; 
      width: 280px;
      /* 石板發光與立體陰影效果 */
      box-shadow: 0px 10px 15px rgba(0,0,0,0.5), 0 0 15px rgba(255, 165, 0, 0.3); 
      border-top: 2px solid #555;
      border-left: 2px solid #555;
      border-bottom: 2px solid #111;
      border-right: 2px solid #111;
      text-align: left;
    }
    .creator { 
      font-weight: bold; 
      color: #ffcc00; 
      margin-bottom: 15px; 
      font-size: 1.1em;
      border-bottom: 1px dashed #666;
      padding-bottom: 10px;
    }
    .message { 
      font-size: 1.2em; 
      line-height: 1.5; 
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h1>🔥 部落記憶石板牆 🔥</h1>
  <p>這裡刻印著我們永不賴皮的約定，一旦刻上，一萬年都不會忘！</p>
  
  <div class="stone-container" id="wall">
    <p>用力挖掘石板中...</p>
  </div>

  <script>
    // 這是你專屬的 Firebase 資料庫網址
    const dbUrl = "https://time-capsule-project-58d37-default-rtdb.europe-west1.firebasedatabase.app/capsules.json";

    // 去資料庫抓資料
    fetch(dbUrl)
      .then(response => response.json())
      .then(data => {
        const wall = document.getElementById('wall');
        wall.innerHTML = ''; // 清空「載入中」的文字

        if(!data) {
          wall.innerHTML = '<p>目前還沒有任何石板喔！趕快去建立第一塊吧！</p>';
          return;
        }

        // 把資料庫裡的每一塊石板抓出來，變成網頁畫面
        for(let key in data) {
          const stoneData = data[key];
          
          // 如果這筆資料沒有內容，就跳過
          if(!stoneData || (!stoneData.creator && !stoneData.message)) continue;

          const stoneDiv = document.createElement('div');
          stoneDiv.className = 'stone';
          
          // 填入發起人與約定內容
          const creatorName = stoneData.creator ? stoneData.creator : '無名氏長老';
          const messageText = stoneData.message ? stoneData.message : '沒有留下隻字片語...';

          stoneDiv.innerHTML = `
            <div class="creator">🗿 發起人：${creatorName}</div>
            <div class="message">${messageText}</div>
          `;
          
          wall.appendChild(stoneDiv);
        }
      })
      .catch(error => {
        console.error("發生錯誤啦：", error);
        document.getElementById('wall').innerHTML = '<p>讀取石板失敗，請確認資料庫連線！</p>';
      });
  </script>

</body>
</html>
