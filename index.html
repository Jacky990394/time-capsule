<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>史前記憶石板牆</title>
  <style>
    body { 
      background-color: #1a1a1a; 
      color: #e0e0e0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      padding: 20px 20px 60px 20px; /* 底部多留一點空間 */
    }
    h1 { color: #ff9800; text-shadow: 0 0 10px #ff9800; margin-bottom: 10px;}
    
    .description {
      font-size: 1.1em;
      margin-bottom: 25px;
      color: #aaaaaa;
    }

    /* 🚀 全新的「我要刻石板」按鈕樣式 */
    .carve-btn {
      display: inline-block;
      margin-bottom: 40px;
      padding: 12px 30px;
      background-color: #ff9800;
      color: #1a1a1a;
      text-decoration: none;
      font-weight: bold;
      font-size: 1.2em;
      border-radius: 30px; /* 圓角按鈕 */
      box-shadow: 0 4px 15px rgba(255, 152, 0, 0.4);
      transition: all 0.3s ease; /* 滑鼠移過去的動畫效果 */
    }
    .carve-btn:hover {
      background-color: #ffb74d;
      transform: scale(1.05); /* 微微放大 */
      box-shadow: 0 6px 20px rgba(255, 152, 0, 0.6);
    }

    .stone-container { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 40px; 
    }

    .stone {
      background-image: url('stone.png'); 
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      background-color: transparent;
      
      box-shadow: none; 
      border: none;
      
      width: 450px;  
      min-height: 280px; 
      max-width: 90vw; 
      box-sizing: border-box; 
      
      padding: 50px; 
      
      display: flex;
      flex-direction: column;
      justify-content: center; 
      align-items: center;     
      
      text-shadow: 1px 1px 3px #000000, -1px -1px 2px rgba(0,0,0,0.5);
    }

    .creator { 
      font-weight: bold; 
      color: #ffd54f; 
      margin-bottom: 15px; 
      font-size: 1.3em; 
      border-bottom: none;
      padding-bottom: 0;
      text-align: center;
    }

    .message { 
      font-size: 1.25em; 
      line-height: 1.6; 
      color: #ffffff;
      white-space: pre-wrap;
      text-align: center; 
    }
  </style>
</head>
<body>

  <h1>🔥 部落記憶石板牆 🔥</h1>
  <p class="description">這裡刻印著我們永不賴皮的約定，一旦刻上，一萬年都不會忘！</p>
  
  <a href="https://tally.so/r/A7d5Py" target="_blank" class="carve-btn">✍️ 我也要刻一塊石板</a>
  
  <div class="stone-container" id="wall">
    <p>用力挖掘石板中...</p>
  </div>

  <script>
    const dbUrl = "https://time-capsule-project-58d37-default-rtdb.europe-west1.firebasedatabase.app/capsules.json";

    fetch(dbUrl)
      .then(response => response.json())
      .then(data => {
        const wall = document.getElementById('wall');
        wall.innerHTML = ''; 

        if(!data) {
          wall.innerHTML = '<p>目前還沒有任何石板喔！趕快去建立第一塊吧！</p>';
          return;
        }

        const capsulesArray = Object.values(data).reverse();

        capsulesArray.forEach(stoneData => {
          if(!stoneData || (!stoneData.creator && !stoneData.message)) return;

          const stoneDiv = document.createElement('div');
          stoneDiv.className = 'stone';
          
          const creatorName = stoneData.creator ? stoneData.creator : '無名氏長老';
          const messageText = stoneData.message ? stoneData.message : '沒有留下隻字片語...';

          stoneDiv.innerHTML = `
            <div class="creator">發起人：${creatorName}</div>
            <div class="message">${messageText}</div>
          `;
          
          wall.appendChild(stoneDiv);
        });
      })
      .catch(error => {
        console.error("發生錯誤啦：", error);
        document.getElementById('wall').innerHTML = '<p>讀取石板失敗，請確認資料庫連線！</p>';
      });
  </script>

</body>
</html>
