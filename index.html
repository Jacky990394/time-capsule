<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>史前記憶石板牆</title>
  <style>
    body { 
      background-color: #1a1a1a; /* 深邃的洞穴背景 */
      color: #e0e0e0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      padding: 20px; 
    }
    h1 { color: #ff9800; text-shadow: 0 0 10px #ff9800; margin-bottom: 30px;}
    
    .stone-container { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 40px; /* 稍微拉開石板之間的距離 */
      margin-top: 20px; 
    }

    /* --- 石板全新霸氣樣式 --- */
    .stone {
      /* 讀取你去背好的圖片 */
      background-image: url('stone.png'); 
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      background-color: transparent;
      
      /* 徹底移除舊有的框線與人工光暈 */
      box-shadow: none; 
      border: none;
      
      /* 放大尺寸與手機適應設定 */
      width: 450px;  
      min-height: 280px; 
      max-width: 90vw; /* 神奇魔法：確保在手機上寬度最多只佔螢幕 90%，不會破版 */
      box-sizing: border-box; 
      
      /* 調整文字內縮，讓字好好待在石頭中央 (上 右 下 左) */
      padding: 60px 50px 50px 50px; 
      
      text-align: left;
      /* 文字立體陰影，讓字有刻在石頭上的感覺 */
      text-shadow: 1px 1px 3px #000000, -1px -1px 2px rgba(0,0,0,0.5);
    }

    .creator { 
      font-weight: bold; 
      color: #ffd54f; /* 亮黃色 */
      margin-bottom: 10px; 
      font-size: 1.3em; /* 放大發起人字體 */
      /* 徹底消滅多餘的白色虛線 */
      border-bottom: none;
      padding-bottom: 0;
    }

    .message { 
      font-size: 1.25em; /* 放大約定內容字體 */
      line-height: 1.6; 
      color: #ffffff;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h1>🔥 部落記憶石板牆 🔥</h1>
  <p>這裡刻印著我們永不賴皮的約定，一旦刻上，一萬年都不會忘！</p>
  
  <div class="stone-container" id="wall">
    <p>用力挖掘石板中...</p>
  </div>
