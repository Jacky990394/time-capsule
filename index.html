<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>史前記憶石板牆</title>
  <style>
    body { 
      background-color: #1a1a1a; 
      color: #e0e0e0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      padding: 20px; 
    }
    h1 { color: #ff9800; text-shadow: 0 0 10px #ff9800; margin-bottom: 30px;}
    
    .stone-container { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 40px; 
      margin-top: 20px; 
    }

    .stone {
      background-image: url('stone.png'); 
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      background-color: transparent;
      
      box-shadow: none; 
      border: none;
      
      width: 450px;  
      min-height: 280px; 
      max-width: 90vw; 
      box-sizing: border-box; 
      
      /* 🟢 調整內縮：增加到 50px，讓文字更往視覺中心集中 */
      padding: 50px; 
      
      /* 🚀 啟動彈性排版，確保垂直與水平都居中 */
      display: flex;
      flex-direction: column;
      justify-content: center; /* 垂直置中 */
      align-items: center;     /* 水平置中 */
      
      text-shadow: 1px 1px 3px #000000, -1px -1px 2px rgba(0,0,0,0.5);
    }

    .creator { 
      font-weight: bold; 
      color: #ffd54f; 
      margin-bottom: 15px; 
      font-size: 1.3em; 
      border-bottom: none;
      padding-bottom: 0;
      text-align: center;
    }

    .message { 
      font-size: 1.25em; 
      line-height: 1.6; 
      color: #ffffff;
      white-space: pre-wrap;
      text-align: center; /* 確保多行文字也是置中的 */
    }
  </style>
</head>
<body>

  <h1>🔥 部落記憶石板牆 🔥</h1>
  <p>這裡刻印著我們永不賴皮的約定，一旦刻上，一萬年都不會忘！</p>
  
  <div class="stone-container" id="wall">
    <p>用力挖掘石板中...</p>
  </div>

  <script>
    const dbUrl = "https://time-capsule-project-58d37-default-rtdb.europe-west1.firebasedatabase.app/capsules.json";

    fetch(dbUrl)
      .then(response => response.json())
      .then(data => {
        const wall = document.getElementById('wall');
        wall.innerHTML = ''; 

        if(!data) {
          wall.innerHTML = '<p>目前還沒有任何石板喔！趕快去建立第一塊吧！</p>';
          return;
        }

        const capsulesArray = Object.values(data).reverse();

        capsulesArray.forEach(stoneData => {
          if(!stoneData || (!stoneData.creator && !stoneData.message)) return;

          const stoneDiv = document.createElement('div');
          stoneDiv.className = 'stone';
          
          const creatorName = stoneData.creator ? stoneData.creator : '無名氏長老';
          const messageText = stoneData.message ? stoneData.message : '沒有留下隻字片語...';

          // 🟢 這裡的 🗿 已經被我移除了
          stoneDiv.innerHTML = `
            <div class="creator">發起人：${creatorName}</div>
            <div class="message">${messageText}</div>
          `;
          
          wall.appendChild(stoneDiv);
        });
      })
      .catch(error => {
        console.error("發生錯誤啦：", error);
        document.getElementById('wall').innerHTML = '<p>讀取石板失敗，請確認資料庫連線！</p>';
      });
  </script>

</body>
</html>
