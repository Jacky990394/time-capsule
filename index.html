<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>史前記憶石板牆</title>
  <style>
    body { 
      background-color: #1a1a1a; /* 深邃的洞穴背景 */
      color: #e0e0e0; 
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
      text-align: center; 
      padding: 20px; 
    }
    h1 { color: #ff9800; text-shadow: 0 0 10px #ff9800; margin-bottom: 30px;}
    
    /* 石板容器設定 */
    .stone-container { 
      display: flex; 
      flex-wrap: wrap; 
      justify-content: center; 
      gap: 30px; /* 增加石板間距 */
      margin-top: 20px; 
    }

    /* --- 核心修改區域：石板樣式 --- */
    .stone {
      /* 設定背景圖片，請確保你的圖片檔名叫做 stone.png */
      background-image: url('stone.png'); 
      /* 讓圖片拉伸填滿整個框框 */
      background-size: 100% 100%;
      background-repeat: no-repeat;
      background-position: center;
      
      /* 取消原本的假邊框和圓角，因為圖片本身就有造型了 */
      border-radius: 0;
      border: none;
      
      width: 300px;  /* 稍微加大寬度 */
      min-height: 180px; /* 設定最小高度，確保圖片不會太扁 */
      
      /* 增加內部邊距，讓文字不要貼到石板邊緣 */
      padding: 35px 40px; 
      
      /* 保留一點點發光效果，但改柔和一點 */
      box-shadow: 0 10px 25px rgba(0,0,0,0.5), 0 0 20px rgba(255, 165, 0, 0.4); 
      
      text-align: left;
      /* 增加文字陰影，確保在石頭紋理上看得清楚 */
      text-shadow: 1px 1px 2px #000000;
    }
    /* --------------------------- */

    .creator { 
      font-weight: bold; 
      color: #ffd54f; /* 稍微亮一點的黃色 */
      margin-bottom: 15px; 
      font-size: 1.1em;
      border-bottom: 1px dashed rgba(255, 255, 255, 0.3);
      padding-bottom: 10px;
    }
    .message { 
      font-size: 1.15em; 
      line-height: 1.6; 
      color: #ffffff;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>

  <h1>🔥 部落記憶石板牆 🔥</h1>
  <p>這裡刻印著我們永不賴皮的約定，一旦刻上，一萬年都不會忘！</p>
  
  <div class="stone-container" id="wall">
    <p>用力挖掘石板中...</p>
  </div>

  <script>
    // 這是你專屬的 Firebase 資料庫網址
    const dbUrl = "https://time-capsule-project-58d37-default-rtdb.europe-west1.firebasedatabase.app/capsules.json";

    // 去資料庫抓資料
    fetch(dbUrl)
      .then(response => response.json())
      .then(data => {
        const wall = document.getElementById('wall');
        wall.innerHTML = ''; // 清空「載入中」的文字

        if(!data) {
          wall.innerHTML = '<p>目前還沒有任何石板喔！趕快去建立第一塊吧！</p>';
          return;
        }

        // 把資料庫裡的每一塊石板抓出來，變成網頁畫面
        // 使用 reverse() 讓最新的石板排在最前面
        const capsulesArray = Object.values(data).reverse();

        capsulesArray.forEach(stoneData => {
          // 如果這筆資料沒有內容，就跳過
          if(!stoneData || (!stoneData.creator && !stoneData.message)) return;

          const stoneDiv = document.createElement('div');
          stoneDiv.className = 'stone';
          
          // 填入發起人與約定內容
          const creatorName = stoneData.creator ? stoneData.creator : '無名氏長老';
          const messageText = stoneData.message ? stoneData.message : '沒有留下隻字片語...';

          stoneDiv.innerHTML = `
            <div class="creator">🗿 發起人：${creatorName}</div>
            <div class="message">${messageText}</div>
          `;
          
          wall.appendChild(stoneDiv);
        });
      })
      .catch(error => {
        console.error("發生錯誤啦：", error);
        document.getElementById('wall').innerHTML = '<p>讀取石板失敗，請確認資料庫連線！</p>';
      });
  </script>

</body>
</html>
